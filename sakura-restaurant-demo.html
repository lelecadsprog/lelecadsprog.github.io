<!DOCTYPE html>
<html>

<head>

<title>Sakura Ramen</title>

<style>

body{
font-family:Arial;
margin:0;
}

header{
background:#222;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#444;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

.hero{
background:url('./restaurant.jpg');
height:500px;
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
}

.section{
padding:40px;
text-align:center;
}

.menu-item{
border:1px solid #ddd;
padding:20px;
margin:10px;
display:inline-block;
width:200px;
}



footer{
background:#222;
color:white;
padding:20px;
text-align:center;
}
.menu-item img{
width:100%;
height:160px;
object-fit:cover;
border-radius:6px;
}

</style>

</head>

<body>

<header>
<h1>Sakura Ramen</h1>
<p>Authentic Japanese Restaurant</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Menu</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<div class="hero">

<img class="slide" src="./restaurant.jpg">
<img class="slide" src="images/rest2.jpg">
<img class="slide" src="images/rest3.jpg">

<div class="hero-text">
<h2>Best Ramen in Town</h2>
<p>Authentic Japanese Flavor</p>
</div>

</div>

<div class="section">

<h2>Popular Menu</h2>

<div class="menu-item">
<img src="./ramen.jpg" width="100%">
<h3>Tonkotsu Ramen</h3>
<p>¥950</p>
</div>

<div class="menu-item">
<img src="./sushi.jpg" width="100%">
<h3>Sushi</h3>
<p>¥650</p>
</div>

<div class="menu-item">
<img src="./gyoza.jpg" width="100%">
<h3>Gyoza</h3>
<p>¥500</p>
</div>

</div>

<div class="section reservation">

<h2>Reserve a Table</h2>

<form class="reservation-form">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="date" required>

<input type="time" required>

<input type="number" placeholder="Number of Guests" min="1" max="10" required>

<button type="submit">Book Reservation</button>

</form>

</div>

<footer>

<p>© Sakura Ramen</p>

</footer>

</body>

</html>
